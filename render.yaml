services:
  - type: web
    name: ecommerce-marketplace-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    env:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: RENDER_EXTERNAL_URL
        value: https://ecommerce-marketplace-api.onrender.com
    healthCheckPath: /health
